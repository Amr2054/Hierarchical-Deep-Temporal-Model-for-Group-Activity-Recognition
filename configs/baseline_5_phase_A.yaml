model:
  num_classes: 8
  input_size: 2048
  hidden_size: 256
  num_layers: 3
  num_classes_label: [ "Waiting", "Setting", "Digging", "Falling", "Spiking", "Blocking", "Jumping", "Moving", "Standing" ]
  save_name: "best_baseline5_phase_A.pth"

training:
  batch_size: 16
  learning_rate: 0.0001
  epochs: 15

data:
  annot_file: "annot_all.pkl"
  videos_dir: "volleyball_/videos"

  video_splits:
    train: [1, 3, 6, 7, 10, 13, 15, 16, 18, 22, 23, 31, 32, 36, 38, 39, 40, 41, 42, 48, 50, 52, 53, 54]
    validation: [0, 2, 8, 12, 17, 19, 24, 26, 27, 28, 30, 33, 46, 49, 51]
    test: [4, 5, 9, 11, 14, 20, 21, 25, 29, 34, 35, 37, 43, 44, 45, 47]