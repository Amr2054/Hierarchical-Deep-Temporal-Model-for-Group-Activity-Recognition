model:
  num_person_classes: 9
  num_group_classes: 8
  person_weights_name: "best_person_classifier.pth"
  save_name: "best_group_classifier.pth"
  group_activity: ["r_set", "r_spike" , "r-pass", "r_winpoint", "l_winpoint", "l-pass", "l-spike", "l_set"]

training:
  batch_size: 8
  learning_rate: 0.0001
  epochs: 15

data:
  annot_file: "annot_all.pkl"
  videos_dir: "volleyball_/videos"

  video_splits:
    train: [1, 3, 6, 7, 10, 13, 15, 16, 18, 22, 23, 31, 32, 36, 38, 39, 40, 41, 42, 48, 50, 52, 53, 54]
    validation: [0, 2, 8, 12, 17, 19, 24, 26, 27, 28, 30, 33, 46, 49, 51]