model:
  num_classes: 8
  num_classes_label:  ["r_set", "r_spike" , "r-pass", "r_winpoint", "l_winpoint", "l-pass", "l-spike", "l_set"]
  save_name: "best_baseline1.pth"

training:
  batch_size: 256
  learning_rate: 0.0001
  epochs: 5
  weight_decay: 1
  early_stop_patience: 5

data:
  annot_file: "annot_all.pkl"
  videos_dir: "volleyball_/videos"
  
  video_splits:
    train: [1, 3, 6, 7, 10, 13, 15, 16, 18, 22, 23, 31, 32, 36, 38, 39, 40, 41, 42, 48, 50, 52, 53, 54]
    validation: [0, 2, 8, 12, 17, 19, 24, 26, 27, 28, 30, 33, 46, 49, 51]
    test: [4, 5, 9, 11, 14, 20, 21, 25, 29, 34, 35, 37, 43, 44, 45, 47]
